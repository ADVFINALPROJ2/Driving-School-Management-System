# Enrollment course categories (the school's course packages offered to students).
# These differ from license_categories.yml which lists government license classes.
# Served via CourseCategoriesController at GET /api/v1/course_categories.
# This is the single source of truth for frontend pricing; do NOT hardcode prices on the client.

categories:
  - id: "auto"
    title: "Auto (Automobile)"
    subtitle: "Category B - Private Manual - Up to 8 Seats"
    price: 26010
    duration_days: 45
    registration_fee: 1500
    education_requirement: "Grade_4_Certificate"
    requirements:
      - text: "Minimum 4th Grade Certificate"
        icon: "graduation"
      - text: "Medical Certificate Required"
        icon: "medical"
      - text: "45 Days Duration"
        icon: "clock"

  - id: "motor"
    title: "Motorcycle"
    subtitle: "Category A - Standard Motorcycle"
    price: 13310
    duration_days: 30
    registration_fee: 1500
    education_requirement: "Grade_4_Certificate"
    requirements:
      - text: "Minimum 4th Grade Certificate"
        icon: "graduation"
      - text: "Medical Certificate Required"
        icon: "medical"
      - text: "30 Days Duration"
        icon: "clock"

  - id: "public1"
    title: "Public-1 (Hizib 1)"
    subtitle: "Category C1 - Up to 20 Seats"
    price: 31310
    duration_days: 60
    registration_fee: 1500
    education_requirement: "Grade_10_Certificate"
    requirements:
      - text: "Valid Auto License Required"
        icon: "license"
      - text: "Minimum 10th Grade Certificate"
        icon: "graduation"
      - text: "60 Days Duration"
        icon: "clock"

  - id: "drycargo1"
    title: "Truck-1 (Derek 1)"
    subtitle: "Category C - Freight Transport"
    price: 29710
    duration_days: 60
    registration_fee: 1500
    education_requirement: "Grade_10_Certificate"
    requirements:
      - text: "Valid Auto License Required"
        icon: "license"
      - text: "Minimum 10th Grade Certificate"
        icon: "graduation"
      - text: "60 Days Duration"
        icon: "clock"
