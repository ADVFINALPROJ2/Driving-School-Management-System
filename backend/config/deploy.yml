# Kamal deploy config — Backend API (Rails) on a single self-hosted VPS.
# Self-contained: images are built ON the VPS and pushed to a local registry
# running on the same VPS (no external registry account needed). Postgres runs
# as an accessory on the same box. See DEPLOY.md for the full runbook.
#
# Required env on the machine running `bin/kamal` (your laptop):
#   DEPLOY_SERVER_IP   public IP of the VPS (also used as the remote build host)
#   APP_HOST           backend API hostname, e.g. api.yourdomain.com
# Required secrets (see .kamal/secrets): RAILS_MASTER_KEY, BACKEND_DATABASE_PASSWORD

service: backend
image: backend

servers:
  web:
    - <%= ENV.fetch("DEPLOY_SERVER_IP") %>

# TLS is terminated by the VPS's existing nginx; kamal-proxy runs HTTP-only on
# custom ports (set once: `kamal proxy boot_config set --http-port 8080 --https-port 8443`)
# and nginx forwards api.dtmf.studio -> 127.0.0.1:8080 with the Host header preserved.
# kamal-proxy still routes by host, so production.rb's assume_ssl/force_ssl stay on
# (nginx must send X-Forwarded-Proto: https). See DEPLOY.md.
proxy:
  ssl: false
  host: <%= ENV.fetch("APP_HOST") %>

# Local registry running on the VPS itself (see the `registry` accessory below).
# Docker treats localhost registries as insecure-OK, so no TLS/auth is needed.
registry:
  server: localhost:5000
  username: deploy
  password:
    - KAMAL_REGISTRY_PASSWORD

# Build the image ON the VPS (remote builder), so the resulting image is pushed
# to the VPS-local registry without shipping it across the network.
builder:
  arch: amd64
  remote: ssh://root@<%= ENV.fetch("DEPLOY_SERVER_IP") %>

# Env injected into the Rails container.
env:
  secret:
    - RAILS_MASTER_KEY
    - BACKEND_DATABASE_PASSWORD
  clear:
    # Reach the Postgres accessory over Kamal's private docker network by name.
    DB_HOST: backend-db
    # Host-authorization / mailer host (must match the proxy host).
    APP_HOST: <%= ENV.fetch("APP_HOST") %>
    # CORS allow-list — must include the frontend origin, e.g.
    # https://app.yourdomain.com (comma-separated for multiple).
    ALLOWED_ORIGINS: <%= ENV.fetch("ALLOWED_ORIGINS", "") %>
    # Store uploads on the mounted volume instead of S3.
    ACTIVE_STORAGE_SERVICE: local
    # Run the Solid Queue worker inside Puma (fine for a single server).
    SOLID_QUEUE_IN_PUMA: true

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"
  # One-shot: create + migrate the primary/cache/queue/cable databases.
  prepare-db: app exec "bin/rails db:prepare"

# Persistent storage for Active Storage uploads (back this path up off-server).
volumes:
  - "backend_storage:/rails/storage"

accessories:
  # Local Docker registry on the VPS — boot this BEFORE the first deploy.
  # Auth via htpasswd (user "deploy" / KAMAL_REGISTRY_PASSWORD). Generate the
  # htpasswd file once (see DEPLOY.md); it is git-ignored.
  registry:
    image: registry:2
    host: <%= ENV.fetch("DEPLOY_SERVER_IP") %>
    port: "127.0.0.1:5000:5000"
    env:
      clear:
        REGISTRY_AUTH: htpasswd
        REGISTRY_AUTH_HTPASSWD_REALM: Registry
        REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
    files:
      - .kamal/registry/htpasswd:/auth/htpasswd
    directories:
      - data:/var/lib/registry

  # PostgreSQL 16 on the VPS. The POSTGRES_USER becomes a superuser, so the app
  # can create the additional cache/queue/cable databases via db:prepare.
  db:
    image: postgres:16-alpine
    host: <%= ENV.fetch("DEPLOY_SERVER_IP") %>
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: backend
        POSTGRES_DB: backend_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
